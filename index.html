<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light" />
  <title>Doğa — Сетка слов (турецкий)</title>
  <style>
    :root{
      /* Spacing */
      --appPadX: 16px;
      --appPadY: 18px;

      /* Palette */
      --ink:#1b0f09;
      --muted:#5e3c2c;
      --accent:#ff3b3b;   /* яркий гранат */
      --accent2:#12c7a2;  /* яркий туркуаз */
      --gold:#ffcc3b;

      /* 3D / materials */
      --shadow: 0 18px 50px rgba(18,10,6,.28);
      --shadow2: 0 12px 22px rgba(18,10,6,.22);
      --radius: 22px;

      /* Grid */
      --gridGap: 6px;
      --cellRadius: 14px;
      --cellSize: 42px;
      --boardPad: 16px;
      --gridPad: 10px;

      /* Safe area */
      --safeB: env(safe-area-inset-bottom, 0px);
      --safeT: env(safe-area-inset-top, 0px);
      --safeL: env(safe-area-inset-left, 0px);
      --safeR: env(safe-area-inset-right, 0px);
    }

    *{box-sizing:border-box}
    html,body{height:100%}

    html{
      /* prevent white gaps if body height is smaller than viewport in some renderers */
      background: #8b461d;
    }

    body{
      margin:0;
      min-height:100%;
      font-family: ui-rounded, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
      color:var(--ink);
      overflow-x:hidden;

      /* Wooden table (no images): layered gradients with grain + knots */
      background:
        radial-gradient(1200px 700px at 18% 8%, rgba(255,255,255,.18), transparent 62%),
        radial-gradient(1100px 700px at 86% 0%, rgba(255,220,150,.10), transparent 62%),
        radial-gradient(900px 650px at 50% 112%, rgba(0,0,0,.26), transparent 70%),
        /* knots / darker swirls */
        radial-gradient(140px 110px at 22% 44%, rgba(55,26,10,.26), transparent 72%),
        radial-gradient(190px 140px at 74% 62%, rgba(55,26,10,.22), transparent 74%),
        radial-gradient(120px 90px at 62% 30%, rgba(55,26,10,.16), transparent 72%),
        /* long grain lines */
        repeating-linear-gradient( 12deg,
          rgba(255,255,255,.05) 0px,
          rgba(255,255,255,.05) 7px,
          rgba(0,0,0,.05) 7px,
          rgba(0,0,0,.05) 14px
        ),
        repeating-linear-gradient( 90deg,
          rgba(255,255,255,.028) 0px,
          rgba(255,255,255,.028) 18px,
          rgba(0,0,0,.040) 18px,
          rgba(0,0,0,.040) 30px
        ),
        linear-gradient(180deg, #b46a34 0%, #87411b 58%, #6a3216 100%);
      background-attachment: fixed;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(closest-side at 50% 0%, rgba(0,0,0,.08), transparent 65%),
        radial-gradient(closest-side at 50% 110%, rgba(0,0,0,.30), transparent 70%);
      mix-blend-mode:multiply;
      opacity:.9;
    }

    .app{
      min-height:100%;
      padding:
        calc(var(--appPadY) + var(--safeT))
        calc(var(--appPadX) + var(--safeR))
        calc(var(--appPadY) + var(--safeB))
        calc(var(--appPadX) + var(--safeL));
      display:flex;
      flex-direction:column;
      gap:14px;
      max-width: 1100px;
      margin:0 auto;
    }

    header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
    }

    .title{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .brand{
      margin:0;
      font-weight: 1000;
      font-size: 46px;
      line-height: .92;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      background: linear-gradient(180deg, #ffffff 0%, #eafff6 20%, #ffefc9 55%, #ffcc3b 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow:
        0 10px 24px rgba(0,0,0,.22),
        0 2px 0 rgba(255,255,255,.14);
      position: relative;
      display: inline-block;
    }

    .brand::after{
      content:"";
      position:absolute;
      left:-12px;
      right:-12px;
      bottom:-10px;
      height:18px;
      background:
        radial-gradient(circle at 20% 50%, rgba(18,199,162,.55), transparent 60%),
        radial-gradient(circle at 55% 20%, rgba(18,199,162,.35), transparent 62%),
        radial-gradient(circle at 80% 60%, rgba(18,199,162,.45), transparent 62%);
      filter: blur(7px);
      opacity:.62;
      z-index:-1;
    }

    .title h1{
      margin:0;
      font-size:14px;
      letter-spacing:.3px;
      line-height:1.25;
      color: rgba(255,255,255,.88);
      text-shadow: 0 2px 0 rgba(0,0,0,.18);
    }
    .title .sub{
      font-size:13px;
      color:rgba(255,255,255,.85);
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .pill{
      background: rgba(255,255,255,.18);
      border: 1px solid rgba(255,255,255,.22);
      color: rgba(255,255,255,.92);
      padding:6px 10px;
      border-radius:999px;
      box-shadow: 0 10px 26px rgba(0,0,0,.12);
      backdrop-filter: blur(10px);
    }

    .layout{
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap:14px;
      align-items:stretch;
    }

    .card{
      border-radius: var(--radius);
      position:relative;
      overflow:hidden;
    }

    /* Raised wooden board */
    .board{
      padding: var(--boardPad);
      background:
        radial-gradient(1200px 700px at 50% 0%, rgba(255,255,255,.22), transparent 56%),
        radial-gradient(260px 180px at 24% 58%, rgba(40,18,7,.12), transparent 70%),
        radial-gradient(220px 160px at 78% 40%, rgba(40,18,7,.10), transparent 72%),
        repeating-linear-gradient( 96deg,
          rgba(255,255,255,.05) 0px,
          rgba(255,255,255,.05) 16px,
          rgba(0,0,0,.06) 16px,
          rgba(0,0,0,.06) 34px
        ),
        repeating-linear-gradient( 10deg,
          rgba(255,255,255,.03) 0px,
          rgba(255,255,255,.03) 5px,
          rgba(0,0,0,.02) 5px,
          rgba(0,0,0,.02) 10px
        ),
        linear-gradient(180deg, #d09155 0%, #a15d2a 58%, #7c3d18 100%);
      border: 2px solid rgba(60,28,10,.55);
      box-shadow:
        0 22px 70px rgba(0,0,0,.26),
        inset 0 2px 0 rgba(255,255,255,.20),
        inset 0 -10px 24px rgba(0,0,0,.22);
    }

    .board::before{
      content:"";
      position:absolute;
      inset:10px;
      border-radius: calc(var(--radius) - 10px);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,.12);
      pointer-events:none;
      opacity:.9;
    }

    .grid{
      display:grid;
      gap: var(--gridGap);
      justify-content:center;
      align-content:center;
      user-select:none;
      -webkit-user-select:none;
      touch-action:none;
      padding: var(--gridPad);
      border-radius: calc(var(--radius) - 10px);
      background:
        radial-gradient(1200px 520px at 50% 0%, rgba(255,255,255,.18), transparent 60%),
        repeating-linear-gradient( 90deg,
          rgba(255,255,255,.06) 0px,
          rgba(255,255,255,.06) 20px,
          rgba(0,0,0,.05) 20px,
          rgba(0,0,0,.05) 40px
        ),
        linear-gradient(180deg, #e1b07a, #c8894b);
      border: 1px solid rgba(60,28,10,.35);
      box-shadow:
        0 14px 34px rgba(0,0,0,.20),
        inset 0 10px 26px rgba(255,255,255,.14),
        inset 0 -12px 22px rgba(0,0,0,.18);
      max-width: 100%;
    }

    /* Carved letter slots */
    .cell{
      position:relative;
      width: var(--cellSize);
      height: var(--cellSize);
      border-radius: var(--cellRadius);
      border: 1px solid rgba(60,28,10,.30);
      background:
        radial-gradient(120% 120% at 30% 20%, rgba(255,255,255,.26), transparent 55%),
        linear-gradient(180deg, #d6a36b, #b9793c);
      color: rgba(42,18,6,.92);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight: 900;
      letter-spacing:.4px;
      font-size: clamp(12px, calc(var(--cellSize) * .42), 18px);
      cursor:pointer;
      box-shadow:
        inset 0 8px 12px rgba(0,0,0,.20),
        inset 0 -6px 10px rgba(255,255,255,.18),
        0 6px 10px rgba(0,0,0,.14);
      transform: translateZ(0);
      transition: transform .08s ease, filter .18s ease, box-shadow .18s ease;
      text-shadow:
        0 1px 0 rgba(255,255,255,.22),
        0 -1px 0 rgba(0,0,0,.25);
    }

    .cell::after{
      content:"";
      position:absolute;
      inset: 3px;
      border-radius: calc(var(--cellRadius) - 3px);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.12);
      pointer-events:none;
      opacity:.8;
    }

    .cell:active{ transform: scale(.97); }

    .cell.selected{
      filter: saturate(1.2);
      box-shadow:
        inset 0 8px 12px rgba(0,0,0,.18),
        inset 0 -6px 10px rgba(255,255,255,.18),
        0 10px 18px rgba(18,199,162,.32);
      border-color: rgba(18,199,162,.75);
      outline: 3px solid rgba(18,199,162,.25);
    }

    .cell.found{
      border-color: rgba(60,28,10,.30);
      box-shadow:
        inset 0 8px 12px rgba(0,0,0,.18),
        inset 0 -6px 10px rgba(255,255,255,.18),
        0 14px 26px rgba(0,0,0,.18);
    }

    .cell.found::before{
      content:"";
      position:absolute;
      inset:-3px;
      border-radius: inherit;
      pointer-events:none;
      background: radial-gradient(closest-side, rgba(255,255,255,.55), transparent 70%);
      opacity:0;
      animation: sparkle .85s ease-out;
    }

    @keyframes sparkle{
      0%{opacity:0; transform:scale(.9)}
      45%{opacity:.9; transform:scale(1.02)}
      100%{opacity:0; transform:scale(1.12)}
    }

    .panel{
      padding: 14px;
      display:flex;
      flex-direction:column;
      gap:12px;
      background:
        radial-gradient(900px 500px at 50% 0%, rgba(255,255,255,.18), transparent 62%),
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(0,0,0,.10));
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .teaWrap{
      display:flex;
      align-items:stretch;
      gap:12px;
    }

    .teaCard{
      flex:0 0 160px;
      padding: 12px;
      border-radius: 18px;
      background:
        radial-gradient(700px 280px at 50% 0%, rgba(255,255,255,.26), transparent 62%),
        linear-gradient(180deg, rgba(255,255,255,.24), rgba(0,0,0,.08));
      border:1px solid rgba(255,255,255,.20);
      box-shadow: 0 18px 34px rgba(0,0,0,.18);
      position:relative;
      overflow:hidden;
    }

    .teaCard h2{
      margin:0 0 10px 0;
      font-size: 13px;
      letter-spacing:.3px;
      color: rgba(255,255,255,.92);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    .percent{
      font-variant-numeric: tabular-nums;
      color: #1b0f09;
      font-weight: 900;
      background: rgba(255,255,255,.82);
      border:1px solid rgba(0,0,0,.12);
      padding:2px 8px;
      border-radius:999px;
      box-shadow: 0 8px 14px rgba(0,0,0,.12);
    }

    .glassWrap{
      height: 200px;
      width: 130px;
      margin: 0 auto;
      position:relative;
    }

    .glassSvg{
      display:block;
      width: 130px;
      height: 188px;
      filter:
        drop-shadow(0 18px 20px rgba(0,0,0,.22))
        drop-shadow(0 6px 8px rgba(0,0,0,.12));
    }

    /* Steam inside SVG */
    .steam path{
      fill:none;
      stroke: rgba(255,255,255,.56);
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: .65;
      transform-box: fill-box;
      transform-origin: center;
      animation: steamFloat 3.2s ease-in-out infinite;
    }

    .steam path:nth-child(2){ animation-delay: .85s; opacity: .52; }
    .steam path:nth-child(3){ animation-delay: 1.7s; opacity: .46; }

    @keyframes steamFloat{
      0%{ transform: translateY(8px); opacity:0; }
      18%{ opacity:.68; }
      100%{ transform: translateY(-10px); opacity:0; }
    }

    /* Tea fill: translate (not scale) so the surface stays natural */
    .teaLiquid{
      transform: translateY(200px);
      transition: transform .85s cubic-bezier(.18,.95,.32,1.02);
      will-change: transform;
    }

    .teaSurface{ transform-origin: 60px 20px; }

    .glassWrap.pouring .teaSurface{
      animation: teaWave .17s ease-in-out infinite alternate;
    }

    @keyframes teaWave{
      from{ transform: translateX(-1.2px) scaleX(1.00); opacity:.92; }
      to{ transform: translateX(1.2px) scaleX(1.02); opacity:1; }
    }

    .glassWrap.pouring .glassSvg{
      animation: glassWiggle .45s ease-in-out 1;
    }

    @keyframes glassWiggle{
      0%{ transform: translateY(0) rotate(0deg); }
      30%{ transform: translateY(1px) rotate(-.8deg); }
      60%{ transform: translateY(-1px) rotate(.6deg); }
      100%{ transform: translateY(0) rotate(0deg); }
    }

    .bubbles{
      position:absolute;
      left:0; right:0;
      top: 8px;
      height: 170px;
      pointer-events:none;
      opacity:.0;
      transition: opacity .25s ease;
    }

    .bubble{
      position:absolute;
      bottom:8px;
      width:8px; height:8px;
      border-radius:999px;
      background: rgba(255,255,255,.38);
      filter: blur(.1px);
      animation: rise 2.2s ease-in infinite;
    }

    @keyframes rise{
      0%{transform: translateY(0) scale(.9); opacity: 0}
      15%{opacity:.9}
      100%{transform: translateY(-150px) scale(1.15); opacity: 0}
    }

    .saucer{
      position:absolute;
      left: 50%;
      bottom: -2px;
      transform: translateX(-50%);
      width: 150px;
      height: 40px;
      opacity: .99;
      filter: drop-shadow(0 12px 12px rgba(0,0,0,.20));
    }

    .words{
      padding: 12px;
      border-radius: 18px;
      background:
        radial-gradient(900px 420px at 50% 0%, rgba(255,255,255,.22), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.20), rgba(0,0,0,.08));
      border:1px solid rgba(255,255,255,.18);
      box-shadow: 0 18px 34px rgba(0,0,0,.16);
      min-height: 220px;
    }

    .words h2{
      margin:0 0 10px 0;
      font-size: 13px;
      letter-spacing:.3px;
      color: rgba(255,255,255,.92);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    ul.wordList{
      list-style:none;
      margin:0;
      padding:0;
      display:grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .word{
      display:flex;
      justify-content:space-between;
      gap:10px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.12);
      box-shadow: 0 10px 16px rgba(0,0,0,.12);
      align-items:baseline;
      color: rgba(255,255,255,.94);
    }

    .word .tr{ font-weight: 900; letter-spacing:.3px; }
    .word .ru{ color: rgba(255,255,255,.75); font-size: 12px; text-align:right; }

    .word.found{
      opacity:.78;
      background: rgba(18,199,162,.16);
      border-color: rgba(18,199,162,.40);
    }

    .word.found .tr, .word.found .ru{
      text-decoration: line-through;
      text-decoration-thickness: 2px;
      text-decoration-color: rgba(18,199,162,.80);
    }

    .footerHint{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,.14);
      border:1px solid rgba(255,255,255,.20);
      box-shadow: 0 14px 26px rgba(0,0,0,.14);
      color: rgba(255,255,255,.88);
      font-size: 12px;
    }

    .btn{
      appearance:none;
      border:none;
      background: linear-gradient(180deg, #ff4040, #c40e22);
      color: #fff;
      font-weight: 900;
      letter-spacing:.2px;
      padding: 10px 14px;
      border-radius: 14px;
      box-shadow:
        0 18px 26px rgba(0,0,0,.18),
        inset 0 2px 0 rgba(255,255,255,.28),
        inset 0 -10px 18px rgba(0,0,0,.18);
      cursor:pointer;
      transition: transform .08s ease, filter .15s ease;
    }

    .btn:active{ transform: scale(.98); }

    .btn.secondary{
      background: linear-gradient(180deg, #12c7a2, #0a7d66);
      box-shadow:
        0 18px 26px rgba(0,0,0,.18),
        inset 0 2px 0 rgba(255,255,255,.22),
        inset 0 -10px 18px rgba(0,0,0,.18);
    }

    .overlay{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding: 20px;
      background: rgba(16,10,8,.55);
      backdrop-filter: blur(10px);
      z-index: 20;
    }

    .overlay.show{ display:flex; }

    .win{
      width:min(520px, 96vw);
      border-radius: 24px;
      background:
        radial-gradient(900px 420px at 50% 0%, rgba(255,255,255,.26), transparent 62%),
        linear-gradient(180deg, rgba(255,255,255,.20), rgba(0,0,0,.10));
      border:1px solid rgba(255,255,255,.22);
      box-shadow: 0 26px 80px rgba(0,0,0,.38);
      padding: 18px;
      text-align:center;
      position:relative;
      overflow:hidden;
      color: rgba(255,255,255,.94);
    }

    .win h2{ margin: 6px 0 6px 0; font-size: 22px; letter-spacing:.2px; }
    .win p{ margin: 0 0 14px 0; color: rgba(255,255,255,.84); font-size: 13px; line-height:1.45; }

    .confetti{ position:absolute; inset:0; pointer-events:none; overflow:hidden; }

    .piece{
      position:absolute;
      top:-10px;
      width:10px;
      height:14px;
      border-radius: 3px;
      opacity:.9;
      animation: fall 1.7s ease-in forwards;
    }

    @keyframes fall{ to{ transform: translateY(120vh) rotate(360deg); opacity:0.98; } }

    @media (max-width: 980px){
      :root{ --cellSize: 40px; --gridGap: 5px; }
      .layout{ grid-template-columns: 1fr; }
      .teaWrap{ justify-content:space-between; }
      .teaCard{ flex: 0 0 170px; }
      ul.wordList{ grid-template-columns: 1fr 1fr; }
    }

    /* Mobile: fix cropping by deriving cell size from viewport width */
    @media (max-width: 520px){
      :root{
        --gridGap: 3px;
        --boardPad: 12px;
        --gridPad: 8px;
        --cellSize: clamp(
          26px,
          calc((100vw - (2 * var(--appPadX)) - var(--safeL) - var(--safeR) - (2 * var(--boardPad)) - (2 * var(--gridPad)) - (9 * var(--gridGap))) / 10),
          38px
        );
        --cellRadius: clamp(10px, calc(var(--cellSize) * .28), 14px);
      }

      header{ flex-direction:column; align-items:flex-start; }
      .teaWrap{ flex-direction:row; }
      .teaCard{ flex:0 0 160px; }
      ul.wordList{ grid-template-columns: 1fr; }
      .glassWrap{ height: 190px; width: 130px; }
      .glassSvg{ height: 178px; }
    }

    @media (prefers-reduced-motion: reduce){
      *{ animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title">
        <div class="brand" aria-label="DOĞA">DOĞA</div>
        <h1>Сетка слов на турецком</h1>
        <div class="sub">
          <div class="pill">Спокойный режим — без таймера</div>
          <div class="pill">Выделяй слова свайпом по буквам</div>
        </div>
      </div>
      <button id="btnNew" class="btn" type="button">Новая сетка</button>
    </header>

    <div class="layout">
      <section class="card board" aria-label="Игровое поле">
        <div id="grid" class="grid" role="grid" aria-label="Сетка букв"></div>
      </section>

      <aside class="card panel" aria-label="Слова и прогресс">
        <div class="teaWrap">
          <div class="teaCard" aria-label="Стакан турецкого чая">
            <h2>
              <span>Çay</span>
              <span id="pct" class="percent">0%</span>
            </h2>

            <div id="glassWrap" class="glassWrap" aria-hidden="true">
              <svg class="glassSvg" viewBox="0 0 120 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <defs>
                  <!-- Ruby tea -->
                  <linearGradient id="teaGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#E45B67" stop-opacity="0.92"/>
                    <stop offset="55%" stop-color="#C93040" stop-opacity="0.94"/>
                    <stop offset="100%" stop-color="#5A0E18" stop-opacity="0.95"/>
                  </linearGradient>

                  <linearGradient id="glassShine" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0%" stop-color="rgba(255,255,255,0)"/>
                    <stop offset="30%" stop-color="rgba(255,255,255,.55)"/>
                    <stop offset="60%" stop-color="rgba(255,255,255,.10)"/>
                    <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
                  </linearGradient>

                  <linearGradient id="spoonGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="rgba(255,255,255,.85)"/>

  <script>
    window.onload = function(){
      var SIZE = 10;
      var TURKISH_ALPHA = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ";

      // Nature theme — combined pool. Each new game picks up to 20 words.
      var ALL_WORDS = [
        // Original
        { tr: "orman",   ru: "лес" },
        { tr: "kır",     ru: "поле/луг" },
        { tr: "ot",      ru: "трава" },
        { tr: "çiçek",   ru: "цветок" },
        { tr: "hayvan",  ru: "животное" },
        { tr: "böcek",   ru: "насекомое" },
        { tr: "ağaç",    ru: "дерево" },
        { tr: "manzara", ru: "пейзаж" },
        { tr: "deniz",   ru: "море" },
        { tr: "okyanus", ru: "океан" },
        { tr: "yaprak",  ru: "лист" },
        { tr: "kuş",     ru: "птица" },
        { tr: "doğal",   ru: "природный" },
        { tr: "dalga",   ru: "волна" },
        { tr: "dağ",     ru: "гора" },
        { tr: "çöl",     ru: "пустыня" },
        { tr: "şelale",  ru: "водопад" },
        { tr: "göl",     ru: "озеро" },
        { tr: "çayır",   ru: "луг" },
        { tr: "ada",     ru: "остров" },
        { tr: "plaj",    ru: "пляж" },

        // New
        { tr: "toprak",   ru: "почва" },
        { tr: "nehir",    ru: "река" },
        { tr: "dere",     ru: "ручей" },
        { tr: "kum",      ru: "песок" },
        { tr: "balık",    ru: "рыба" },
        { tr: "yıldız",   ru: "звезда" },
        { tr: "rüzgar",   ru: "ветер" },
        { tr: "hava",     ru: "воздух" },
        { tr: "bulut",    ru: "облако" },
        { tr: "yıldırım", ru: "молния" },
        { tr: "gökyüzü",  ru: "небо" },
        { tr: "tepe",     ru: "холм" },
        { tr: "kaya",     ru: "скала" },
        { tr: "taş",      ru: "камень" },
        { tr: "dal",      ru: "ветка" },
        { tr: "sahil",    ru: "берег" },
        { tr: "yağmur",   ru: "дождь" },
        { tr: "kar",      ru: "снег" },
        { tr: "fırtına",  ru: "шторм" },
        { tr: "sis",      ru: "туман" },
        { tr: "ışık",     ru: "свет" }
      ];

      // Active words for the current board
      var WORDS = [];

      var COLORS = [
        "#ff3b3b", // nar
        "#12c7a2", // turkuaz
        "#ffcc3b", // gold
        "#7D3C98", // mor
        "#2E86C1", // mavi
        "#FF7A00",
        "#16A085",
        "#C0392B",
        "#8E44AD",
        "#27AE60",
        "#E91E63",
        "#00B0FF"
      ];

      var gridEl = document.getElementById("grid");
      var wordListEl = document.getElementById("wordList");
      var foundCountEl = document.getElementById("foundCount");
      var pctEl = document.getElementById("pct");
      var bubblesEl = document.getElementById("bubbles");
      var overlayEl = document.getElementById("overlay");
      var confettiEl = document.getElementById("confetti");

      var teaLiquidEl = document.getElementById("teaLiquid");
      var glassWrapEl = document.getElementById("glassWrap");

      var btnNew = document.getElementById("btnNew");
      var btnReset = document.getElementById("btnReset");
      var btnAgain = document.getElementById("btnAgain");
      var btnClose = document.getElementById("btnClose");

      // Board state
      var board = [];

      // Found words: simple map for max compatibility
      var foundMap = {};
      var foundN = 0;

      // Selection state
      var selecting = false;
      var path = []; // {r,c}
      var dir = null; // {dr,dc}

      // Tea animation state
      var lastTeaPct = 0;

      // Word occurrences on this board (for per-letter "correct" click)
      // wordOcc[wordUp] = [ [ {r,c}, ... ], ... ]  (each occurrence in the word's reading order)
      var wordOcc = {};

      // Web Audio
      var audioCtx = null;
      var audioArmed = false;

      function upTR(s){
        // Manual Turkish uppercase — iOS Safari toLocaleUpperCase('tr-TR') can fail
        var map = {'ı':'I','i':'İ','ş':'Ş','ç':'Ç','ö':'Ö','ü':'Ü','ğ':'Ğ','â':'Â'};
        var out = "";
        var i;
        for(i=0; i<s.length; i++){
          var ch = s.charAt(i);
          out += (map[ch] ? map[ch] : ch.toUpperCase());
        }
        return out;
      }

      function randInt(n){ return Math.floor(Math.random() * n); }
      function pick(arr){ return arr[randInt(arr.length)]; }

      function normStep(dr, dc){
        var sdr = (dr === 0) ? 0 : (dr > 0 ? 1 : -1);
        var sdc = (dc === 0) ? 0 : (dc > 0 ? 1 : -1);
        return { dr: sdr, dc: sdc };
      }

      function sameDir(a, b){ return !!(a && b && a.dr === b.dr && a.dc === b.dc); }

      function makeEmptyBoard(){
        var b = [];
        var r, c;
        for(r=0; r<SIZE; r++){
          var row = [];
          for(c=0; c<SIZE; c++) row.push("");
          b.push(row);
        }
        return b;
      }

      function fits(r, c){ return r >= 0 && r < SIZE && c >= 0 && c < SIZE; }

      function shuffleInPlace(arr){
        var i;
        for(i=arr.length-1; i>0; i--){
          var j = randInt(i+1);
          var t = arr[i];
          arr[i] = arr[j];
          arr[j] = t;
        }
        return arr;
      }

      function generateRandomBoard(){
        var fb = makeEmptyBoard();
        var r, c;
        for(r=0; r<SIZE; r++){
          for(c=0; c<SIZE; c++) fb[r][c] = TURKISH_ALPHA.charAt(randInt(TURKISH_ALPHA.length));
        }
        return fb;
      }

      function generateBoard(words){
        // No diagonals
        var directions = [
          {dr: 1, dc: 0}, {dr: -1, dc: 0},
          {dr: 0, dc: 1}, {dr: 0, dc: -1}
        ];

        var wordsUpper = [];
        var i;
        for(i=0; i<words.length; i++){
          var w = words[i];
          wordsUpper.push({ tr: w.tr, ru: w.ru, up: upTR(w.tr) });
        }

        // place longer first
        wordsUpper.sort(function(a,b){ return b.up.length - a.up.length; });

        // More words => more retries (still fast enough for 10x10)
        var maxAttempts = 260 + wordsUpper.length * 28;
        var triesPerWord = 2200;

        var attempt;
        for(attempt=0; attempt<maxAttempts; attempt++){
          var b = makeEmptyBoard();
          var okAll = true;

          var wi;
          for(wi=0; wi<wordsUpper.length; wi++){
            var ww = wordsUpper[wi];
            var placed = false;
            var t;

            for(t=0; t<triesPerWord; t++){
              var d = pick(directions);
              var len = ww.up.length;

              var r0 = randInt(SIZE);
              var c0 = randInt(SIZE);
              var r1 = r0 + (len - 1) * d.dr;
              var c1 = c0 + (len - 1) * d.dc;
              if(!fits(r1, c1)) continue;

              var can = true;
              var j;
              for(j=0; j<len; j++){
                var rr = r0 + j * d.dr;
                var cc = c0 + j * d.dc;
                var ch = ww.up.charAt(j);
                var cur = b[rr][cc];
                if(cur !== "" && cur !== ch){ can = false; break; }
              }
              if(!can) continue;

              for(j=0; j<len; j++){
                rr = r0 + j * d.dr;
                cc = c0 + j * d.dc;
                b[rr][cc] = ww.up.charAt(j);
              }

              placed = true;
              break;
            }

            if(!placed){ okAll = false; break; }
          }

          if(!okAll) continue;

          // Fill empty
          var r, c;
          for(r=0; r<SIZE; r++){
            for(c=0; c<SIZE; c++){
              if(b[r][c] === ""){
                b[r][c] = TURKISH_ALPHA.charAt(randInt(TURKISH_ALPHA.length));
              }
            }
          }

          return b;
        }

        return null;
      }

      function pickWordsAndBoard(){
        var pool = ALL_WORDS.slice();
        shuffleInPlace(pool);

        var maxN = 20;
        if(maxN > pool.length) maxN = pool.length;

        var n;
        for(n=maxN; n>=10; n--){
          var candidate = pool.slice(0, n);
          var b = generateBoard(candidate);
          if(b){
            WORDS = candidate;
            return b;
          }
        }

        // Last resort
        WORDS = pool.slice(0, 10);
        var bb = generateBoard(WORDS);
        return bb ? bb : generateRandomBoard();
      }

      function renderBoard(){

        gridEl.innerHTML = "";
        gridEl.style.gridTemplateColumns = "repeat(" + SIZE + ", var(--cellSize))";

        var frag = document.createDocumentFragment();
        var r, c;
        for(r=0; r<SIZE; r++){
          for(c=0; c<SIZE; c++){
            var btn = document.createElement("button");
            btn.type = "button";
            btn.className = "cell";
            btn.textContent = board[r][c];
            btn.setAttribute("data-r", String(r));
            btn.setAttribute("data-c", String(c));
            btn.setAttribute("role", "gridcell");
            btn.setAttribute("aria-label", (r+1) + ":" + (c+1) + " " + board[r][c]);
            frag.appendChild(btn);
          }
        }
        gridEl.appendChild(frag);
      }

      function renderWords(){
        wordListEl.innerHTML = "";
        var i;
        for(i=0; i<WORDS.length; i++){
          var w = WORDS[i];
          var li = document.createElement("li");
          li.className = "word";
          li.setAttribute("data-word", upTR(w.tr));
          li.setAttribute("data-idx", String(i));
          li.innerHTML = '<span class="tr">' + w.tr + '</span><span class="ru">' + w.ru + '</span>';
          wordListEl.appendChild(li);
        }
        updateUI(true);
      }

      function foundHas(wordUp){ return foundMap[wordUp] === 1; }

      function foundAdd(wordUp){
        if(foundHas(wordUp)) return false;
        foundMap[wordUp] = 1;
        foundN += 1;
        return true;
      }

      function foundReset(){
        foundMap = {};
        foundN = 0;
      }

      function setPouring(on){
        if(!glassWrapEl) return;
        if(on) glassWrapEl.classList.add("pouring");
        else glassWrapEl.classList.remove("pouring");
      }

      function updateTeaFill(pct, silent){
        if(!teaLiquidEl) return;
        var s = pct / 100;
        if(s < 0) s = 0;
        if(s > 1) s = 1;

        // translate from empty (below) to a classic tea fill (~60–65% height when full)
        var yEmpty = 200;
        var yFull = 70;
        var y = Math.round(yEmpty + (yFull - yEmpty) * s);
        teaLiquidEl.style.transform = "translateY(" + y + "px)";

        if(!silent && pct > lastTeaPct){
          // pouring FX
          setPouring(true);
          playPourSound(pct - lastTeaPct);
          (function(){
            var t = setTimeout(function(){ setPouring(false); clearTimeout(t); }, 520);
          })();
        }

        lastTeaPct = pct;
      }

      function updateUI(silentTea){
        var total = WORDS.length;
        foundCountEl.textContent = foundN + "/" + total;

        var p = total ? Math.round((foundN / total) * 100) : 0;
        pctEl.textContent = p + "%";
        updateTeaFill(p, !!silentTea);

        bubblesEl.style.opacity = foundN ? "1" : "0";

        // update word list
        var children = wordListEl.children;
        var i;
        for(i=0; i<children.length; i++){
          var li = children[i];
          var wu = li.getAttribute("data-word");
          if(foundHas(wu)) li.classList.add("found");
          else li.classList.remove("found");
        }
      }

      function clearSelectionVisual(){
        var els = document.querySelectorAll(".cell.selected");
        var i;
        for(i=0; i<els.length; i++) els[i].classList.remove("selected");
      }

      function cellEl(r, c){
        return gridEl.querySelector('.cell[data-r="' + r + '"][data-c="' + c + '"]');
      }

      function setSelectedVisual(){
        clearSelectionVisual();
        var i;
        for(i=0; i<path.length; i++){
          var p = path[i];
          var el = cellEl(p.r, p.c);
          if(el && !el.classList.contains("found")) el.classList.add("selected");
        }
      }

      function findCellFromElement(el){
        while(el && el !== gridEl){
          if(el.classList && el.classList.contains("cell")) return el;
          el = el.parentNode;
        }
        return null;
      }

      function pointToCell(clientX, clientY){
        var el = document.elementFromPoint(clientX, clientY);
        if(!el) return null;
        var btn = findCellFromElement(el);
        if(!btn) return null;
        var r = Number(btn.getAttribute("data-r"));
        var c = Number(btn.getAttribute("data-c"));
        if(isNaN(r) || isNaN(c)) return null;
        return { r: r, c: c };
      }

      function pathString(){
        var s = "";
        var i;
        for(i=0; i<path.length; i++){
          var p = path[i];
          s += board[p.r][p.c];
        }
        return s;
      }

      function reverseStr(u){
        return u.split("").reverse().join("");
      }

      function isKnownWord(s){
        var u = s;
        var r = reverseStr(u);
        var i;
        for(i=0; i<WORDS.length; i++){
          var wup = upTR(WORDS[i].tr);
          if(wup === u) return u;
          if(wup === r) return r;
        }
        return null;
      }

      function buildWordOccurrences(b){
        var occ = {};
        var i;
        for(i=0; i<WORDS.length; i++){
          var wup = upTR(WORDS[i].tr);
          var rev = reverseStr(wup);
          var out = [];
          var len = wup.length;

          // horizontal (scan left->right)
          var r, c, j;
          for(r=0; r<SIZE; r++){
            for(c=0; c<=SIZE-len; c++){
              var s = "";
              var coords = [];
              for(j=0; j<len; j++){
                s += b[r][c+j];
                coords.push({r:r, c:(c+j)});
              }
              if(s === wup) out.push(coords);
              else if(s === rev) out.push(coords.slice().reverse());
            }
          }

          // vertical (scan top->bottom)
          for(c=0; c<SIZE; c++){
            for(r=0; r<=SIZE-len; r++){
              s = "";
              coords = [];
              for(j=0; j<len; j++){
                s += b[r+j][c];
                coords.push({r:(r+j), c:c});
              }
              if(s === wup) out.push(coords);
              else if(s === rev) out.push(coords.slice().reverse());
            }
          }

          occ[wup] = out;
        }
        return occ;
      }

      function pathIsPrefixOf(pathCells, seqCells){
        if(pathCells.length > seqCells.length) return false;
        var i;
        for(i=0; i<pathCells.length; i++){
          if(pathCells[i].r !== seqCells[i].r) return false;
          if(pathCells[i].c !== seqCells[i].c) return false;
        }
        return true;
      }

      function isCorrectPathSoFar(){
        if(!path || !path.length) return false;
        var i, k;
        for(i=0; i<WORDS.length; i++){
          var wup = upTR(WORDS[i].tr);
          if(foundHas(wup)) continue;
          var arr = wordOcc[wup];
          if(!arr || !arr.length) continue;
          for(k=0; k<arr.length; k++){
            var seq = arr[k];
            if(pathIsPrefixOf(path, seq)) return true;
            // allow starting from the other end
            var revSeq = seq.slice().reverse();
            if(pathIsPrefixOf(path, revSeq)) return true;
          }
        }
        return false;
      }

      function hexToRgba(hex, a){
        var h = hex.replace("#", "");
        var r = parseInt(h.slice(0,2), 16);
        var g = parseInt(h.slice(2,4), 16);
        var b = parseInt(h.slice(4,6), 16);
        return "rgba(" + r + "," + g + "," + b + "," + a + ")";
      }

      function popBubbles(){
        bubblesEl.innerHTML = "";
        var p = foundN;
        if(p < 2) p = 2;
        if(p > 10) p = 10;

        var i;
        for(i=0; i<p; i++){
          var b = document.createElement("div");
          b.className = "bubble";
          var left = 10 + Math.random() * 80;
          var delay = Math.random() * 0.9;
          var dur = 1.7 + Math.random() * 0.9;
          var size = 6 + Math.random() * 7;
          b.style.left = left + "%";
          b.style.animationDelay = delay + "s";
          b.style.animationDuration = dur + "s";
          b.style.width = size + "px";
          b.style.height = size + "px";
          bubblesEl.appendChild(b);
        }
      }

      function fireConfetti(){
        confettiEl.innerHTML = "";
        var colors = ["#ff3b3b", "#12c7a2", "#ffcc3b", "#2E86C1", "#FF7A00", "#8E44AD"]; 
        var i;
        for(i=0; i<44; i++){
          var p = document.createElement("div");
          p.className = "piece";
          p.style.left = (Math.random()*100) + "%";
          p.style.background = colors[i % colors.length];
          p.style.transform = "translateY(-10px) rotate(" + (Math.random()*120) + "deg)";
          p.style.animationDelay = (Math.random()*0.35) + "s";
          p.style.animationDuration = (1.35 + Math.random()*0.8) + "s";
          p.style.width = (8 + Math.random()*10) + "px";
          p.style.height = (10 + Math.random()*14) + "px";
          confettiEl.appendChild(p);
        }
      }

      function showWin(){
        overlayEl.classList.add("show");
        overlayEl.setAttribute("aria-hidden", "false");
        fireConfetti();
        playWinSound();
      }

      function hideWin(){
        overlayEl.classList.remove("show");
        overlayEl.setAttribute("aria-hidden", "true");
        confettiEl.innerHTML = "";
      }

      function clearSelection(){
        selecting = false;
        path = [];
        dir = null;
        clearSelectionVisual();
      }

      function resetProgress(){
        foundReset();
        hideWin();
        clearSelection();

        // remove found styles
        var cells = document.querySelectorAll(".cell");
        var i;
        for(i=0; i<cells.length; i++){
          cells[i].classList.remove("found");
          cells[i].classList.remove("selected");
          cells[i].removeAttribute("style");
        }

        var words = document.querySelectorAll(".word");
        for(i=0; i<words.length; i++){
          words[i].classList.remove("found");
          words[i].removeAttribute("style");
        }

        lastTeaPct = 0;
        updateUI(true);
        popBubbles();
      }

      function newGame(){
        foundReset();
        hideWin();
        clearSelection();
        board = pickWordsAndBoard();
        wordOcc = buildWordOccurrences(board);
        renderBoard();
        renderWords();
        popBubbles();
      }

      function markFound(wordUp){
        if(!foundAdd(wordUp)) return;

        // color
        var idx = 0;
        var i;
        for(i=0; i<WORDS.length; i++){
          if(upTR(WORDS[i].tr) === wordUp){ idx = i; break; }
        }
        var color = COLORS[idx % COLORS.length];

        // Lock in the cells for this path (in either direction)
        var candidate = pathString();
        var chosen = path;
        if(candidate !== wordUp){
          chosen = [];
          for(i=path.length-1; i>=0; i--) chosen.push(path[i]);
        }

        for(i=0; i<chosen.length; i++){
          var pp = chosen[i];
          var el = cellEl(pp.r, pp.c);
          if(!el) continue;
          el.classList.remove("selected");
          el.classList.add("found");
          el.style.background = "radial-gradient(120% 120% at 30% 20%, rgba(255,255,255,.25), transparent 55%), linear-gradient(180deg, " + hexToRgba(color,.64) + ", rgba(200,120,60,.82))";
          el.style.borderColor = hexToRgba(color,.70);
          el.style.outline = "3px solid " + hexToRgba(color,.20);
          el.style.boxShadow =
            "inset 0 8px 12px rgba(0,0,0,.18), " +
            "inset 0 -6px 10px rgba(255,255,255,.16), " +
            "0 14px 24px " + hexToRgba(color,.20);
        }

        // Highlight the word item
        var children = wordListEl.children;
        for(i=0; i<children.length; i++){
          var li = children[i];
          if(li.getAttribute("data-word") === wordUp){
            li.classList.add("found");
            li.style.borderColor = hexToRgba(color,.42);
            li.style.boxShadow = "0 14px 24px " + hexToRgba(color,.18);
            break;
          }
        }

        updateUI(false);
        playSuccessSound();
        popBubbles();

        if(foundN === WORDS.length) showWin();
      }

      function addToPath(cell){
        if(!cell) return;

        var last = path.length ? path[path.length - 1] : null;
        if(last && last.r === cell.r && last.c === cell.c) return;

        // no repeats
        var i;
        for(i=0; i<path.length; i++){
          if(path[i].r === cell.r && path[i].c === cell.c) return;
        }

        if(path.length === 0){
          path.push(cell);
          setSelectedVisual();
          if(isCorrectPathSoFar()) playTapSound(0.65);
          return;
        }

        var prev = path[path.length - 1];
        var dr = cell.r - prev.r;
        var dc = cell.c - prev.c;

        // no diagonals: only 4-neighborhood
        if((Math.abs(dr) + Math.abs(dc)) !== 1) return;

        var step = normStep(dr, dc);

        if(path.length === 1){
          dir = step;
          path.push(cell);
          setSelectedVisual();
          if(isCorrectPathSoFar()) playTapSound(0.72);
          return;
        }

        if(!sameDir(dir, step)) return;

        // enforce straight-line continuation
        var expected = { r: prev.r + dir.dr, c: prev.c + dir.dc };
        if(cell.r !== expected.r || cell.c !== expected.c) return;

        path.push(cell);
        setSelectedVisual();
        if(isCorrectPathSoFar()) playTapSound(0.78);
      }

      function finalizeSelection(){
        if(path.length < 2){
          clearSelection();
          return;
        }
        var s = pathString();
        var hit = isKnownWord(s);
        if(hit) markFound(hit);
        clearSelection();
      }

      function armAudio(){
        if(audioArmed) return;
        audioArmed = true;
        try{
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(err){
          audioCtx = null;
        }
      }

      function resumeAudio(){
        if(!audioCtx) return;
        if(audioCtx.state === "suspended"){
          try{ audioCtx.resume(); } catch(e){}
        }
      }

      function playTapSound(str){
        if(!audioCtx) return;
        var t0 = audioCtx.currentTime;
        var strength = (typeof str === "number") ? str : 0.7;

        var master = audioCtx.createGain();
        master.gain.setValueAtTime(0.0001, t0);
        master.gain.exponentialRampToValueAtTime(0.18 * strength, t0 + 0.008);
        master.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.06);
        master.connect(audioCtx.destination);

        // short "pop": sine + tiny noise click
        var o = audioCtx.createOscillator();
        o.type = "sine";
        o.frequency.setValueAtTime(420 + 240 * strength, t0);
        o.frequency.exponentialRampToValueAtTime(220 + 120 * strength, t0 + 0.05);

        var g = audioCtx.createGain();
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(0.38, t0 + 0.008);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.05);

        o.connect(g);
        g.connect(master);
        o.start(t0);
        o.stop(t0 + 0.06);

        var noiseBuf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.02), audioCtx.sampleRate);
        var data = noiseBuf.getChannelData(0);
        var i;
        for(i=0; i<data.length; i++) data[i] = (Math.random()*2-1) * (1 - i/data.length);

        var ns = audioCtx.createBufferSource();
        ns.buffer = noiseBuf;
        var hp = audioCtx.createBiquadFilter();
        hp.type = "highpass";
        hp.frequency.setValueAtTime(2500, t0);

        var ng = audioCtx.createGain();
        ng.gain.setValueAtTime(0.0001, t0);
        ng.gain.exponentialRampToValueAtTime(0.10 * strength, t0 + 0.003);
        ng.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.02);

        ns.connect(hp);
        hp.connect(ng);
        ng.connect(master);
        ns.start(t0);
        ns.stop(t0 + 0.02);
      }

      function playPourSound(deltaPct){
        if(!audioCtx) return;
        var t0 = audioCtx.currentTime;
        var dur = 0.20 + Math.min(0.55, (deltaPct || 6) / 60);

        var master = audioCtx.createGain();
        master.gain.setValueAtTime(0.0001, t0);
        master.gain.exponentialRampToValueAtTime(0.20, t0 + 0.02);
        master.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
        master.connect(audioCtx.destination);

        // Pink-ish noise made from filtered white noise
        var noiseBuf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * dur), audioCtx.sampleRate);
        var data = noiseBuf.getChannelData(0);
        var i;
        for(i=0; i<data.length; i++){
          var t = i / data.length;
          data[i] = (Math.random()*2-1) * (0.70 - 0.55*t);
        }

        var src = audioCtx.createBufferSource();
        src.buffer = noiseBuf;

        var bp = audioCtx.createBiquadFilter();
        bp.type = "bandpass";
        bp.frequency.setValueAtTime(900, t0);
        bp.frequency.exponentialRampToValueAtTime(1200, t0 + dur);
        bp.Q.setValueAtTime(0.9, t0);

        var lp = audioCtx.createBiquadFilter();
        lp.type = "lowpass";
        lp.frequency.setValueAtTime(3800, t0);

        var g = audioCtx.createGain();
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(0.65, t0 + 0.03);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);

        src.connect(bp);
        bp.connect(lp);
        lp.connect(g);
        g.connect(master);

        src.start(t0);
        src.stop(t0 + dur);

        // a couple of tiny "glug" blips
        var n;
        for(n=0; n<2; n++){
          var dt = 0.06 + n * (dur * 0.40);
          var o = audioCtx.createOscillator();
          o.type = "sine";
          o.frequency.setValueAtTime(140 + n*30, t0 + dt);

          var og = audioCtx.createGain();
          og.gain.setValueAtTime(0.0001, t0 + dt);
          og.gain.exponentialRampToValueAtTime(0.16, t0 + dt + 0.01);
          og.gain.exponentialRampToValueAtTime(0.0001, t0 + dt + 0.08);

          o.connect(og);
          og.connect(master);
          o.start(t0 + dt);
          o.stop(t0 + dt + 0.09);
        }
      }

      function playSuccessSound(){
        if(!audioCtx) return;
        var t0 = audioCtx.currentTime;

        var master = audioCtx.createGain();
        master.gain.setValueAtTime(0.0001, t0);
        master.gain.exponentialRampToValueAtTime(0.35, t0 + 0.02);
        master.gain.exponentialRampToValueAtTime(0.001, t0 + 0.45);
        master.connect(audioCtx.destination);

        var freqs = [523.25, 659.25, 783.99];
        var i;
        for(i=0; i<freqs.length; i++){
          var f = freqs[i];
          var o = audioCtx.createOscillator();
          o.type = (i === 0) ? "triangle" : "sine";
          o.frequency.setValueAtTime(f, t0);
          o.frequency.exponentialRampToValueAtTime(f * 1.02, t0 + 0.08);

          var g = audioCtx.createGain();
          g.gain.setValueAtTime(0.0001, t0);
          g.gain.exponentialRampToValueAtTime(0.22 - i*0.04, t0 + 0.015);
          g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.38);

          o.connect(g);
          g.connect(master);
          o.start(t0 + i*0.008);
          o.stop(t0 + 0.42);
        }

        // noise spark
        var noiseBuf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.10), audioCtx.sampleRate);
        var data = noiseBuf.getChannelData(0);
        for(i=0; i<data.length; i++) data[i] = (Math.random()*2-1) * (1 - i/data.length);

        var ns = audioCtx.createBufferSource();
        ns.buffer = noiseBuf;
        var bp = audioCtx.createBiquadFilter();
        bp.type = "bandpass";
        bp.frequency.setValueAtTime(3200, t0);
        bp.Q.setValueAtTime(6, t0);

        var ng = audioCtx.createGain();
        ng.gain.setValueAtTime(0.0001, t0);
        ng.gain.exponentialRampToValueAtTime(0.18, t0 + 0.01);
        ng.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.12);

        ns.connect(bp);
        bp.connect(ng);
        ng.connect(master);
        ns.start(t0);
        ns.stop(t0 + 0.12);
      }

      function playWinSound(){
        if(!audioCtx) return;
        var t0 = audioCtx.currentTime;
        var master = audioCtx.createGain();
        master.gain.setValueAtTime(0.0001, t0);
        master.gain.exponentialRampToValueAtTime(0.45, t0 + 0.03);
        master.gain.exponentialRampToValueAtTime(0.001, t0 + 0.8);
        master.connect(audioCtx.destination);

        var notes = [
          {f: 523.25, dt:0.00},
          {f: 659.25, dt:0.06},
          {f: 783.99, dt:0.12},
          {f: 1046.5, dt:0.18}
        ];

        var i;
        for(i=0; i<notes.length; i++){
          var n = notes[i];
          var o = audioCtx.createOscillator();
          o.type = "sine";
          o.frequency.setValueAtTime(n.f, t0 + n.dt);
          var g = audioCtx.createGain();
          g.gain.setValueAtTime(0.0001, t0 + n.dt);
          g.gain.exponentialRampToValueAtTime(0.28, t0 + n.dt + 0.02);
          g.gain.exponentialRampToValueAtTime(0.0001, t0 + n.dt + 0.55);
          o.connect(g);
          g.connect(master);
          o.start(t0 + n.dt);
          o.stop(t0 + n.dt + 0.6);
        }
      }

      // Pointer / touch handling
      function onPointerDown(e){
        var tgt = e.target;
        if(!tgt) return;

        var cellBtn = findCellFromElement(tgt);
        if(!cellBtn) return;

        armAudio();
        resumeAudio();

        selecting = true;
        if(gridEl.setPointerCapture) gridEl.setPointerCapture(e.pointerId);

        var r = Number(cellBtn.getAttribute("data-r"));
        var c = Number(cellBtn.getAttribute("data-c"));
        clearSelection();
        selecting = true;
        addToPath({r:r, c:c});

        if(e && e.preventDefault) e.preventDefault();
      }

      function onPointerMove(e){
        if(!selecting) return;
        var cell = pointToCell(e.clientX, e.clientY);
        addToPath(cell);
        if(e && e.preventDefault) e.preventDefault();
      }

      function onPointerUp(e){
        if(!selecting) return;
        finalizeSelection();
        if(e && e.preventDefault) e.preventDefault();
      }

      function onPointerCancel(){
        if(!selecting) return;
        clearSelection();
      }

      btnNew.addEventListener("click", function(){ newGame(); });
      btnReset.addEventListener("click", function(){ resetProgress(); });
      btnAgain.addEventListener("click", function(){ hideWin(); newGame(); });
      btnClose.addEventListener("click", function(){ hideWin(); });
      overlayEl.addEventListener("click", function(e){
        if(e && e.target === overlayEl) hideWin();
      });

      gridEl.addEventListener("pointerdown", onPointerDown);
      gridEl.addEventListener("pointermove", onPointerMove);
      gridEl.addEventListener("pointerup", onPointerUp);
      gridEl.addEventListener("pointercancel", onPointerCancel);
      gridEl.addEventListener("lostpointercapture", onPointerCancel);

      // Prevent accidental scroll on iOS when selecting
      gridEl.addEventListener("touchmove", function(e){ if(e && e.preventDefault) e.preventDefault(); }, {passive:false});

      // init
      try{
        newGame();
      } catch(e){
        document.body.innerHTML = '<pre style="color:red;padding:20px">' + (e && e.message ? e.message : "Error") + '\n' + (e && e.stack ? e.stack : "") + '</pre>';
      }
    };
  </script>
