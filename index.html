<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="color-scheme" content="light" />
  <title>Doğa — Сетка слов (турецкий)</title>
  <style>
    :root{
      --bg0:#ffe1b8;
      --bg1:#ff7a4c;
      --card:#fffdf8;
      --ink:#1a0f0b;
      --muted:#5a3a2e;
      --shadow: 0 18px 50px rgba(42,28,20,.18);
      --shadow2: 0 10px 22px rgba(42,28,20,.14);
      --accent:#E84545; /* nar (brighter) */
      --accent2:#0FA98F; /* turkuaz (brighter) */
      --gold:#F4B93A;
      --gridGap: 6px;
      --radius: 22px;
      --cellRadius: 14px;
      --cellSize: 42px;
      --boardPad: 16px;
      --gridPad: 10px;
      --safeB: env(safe-area-inset-bottom, 0px);
      --safeT: env(safe-area-inset-top, 0px);
      --safeL: env(safe-area-inset-left, 0px);
      --safeR: env(safe-area-inset-right, 0px);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-rounded, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Apple Color Emoji", "Segoe UI Emoji";
      color:var(--ink);
      background:
        radial-gradient(900px 500px at 12% 8%, rgba(15,169,143,.22), transparent 62%),
        radial-gradient(800px 520px at 90% 18%, rgba(232,69,69,.24), transparent 64%),
        radial-gradient(900px 600px at 50% 110%, rgba(244,185,58,.26), transparent 68%),
        linear-gradient(165deg, var(--bg0), var(--bg1));
      overflow-x:hidden;
    }

    .app{
      min-height:100%;
      padding: calc(18px + var(--safeT)) calc(16px + var(--safeR)) calc(18px + var(--safeB)) calc(16px + var(--safeL));
      display:flex;
      flex-direction:column;
      gap:14px;
      max-width: 1100px;
      margin:0 auto;
    }

    header{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:14px;
    }

    .title{
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .title h1{
      margin:0;
      font-size:20px;
      letter-spacing:.2px;
      line-height:1.15;
    }
    .title .sub{
      font-size:13px;
      color:var(--muted);
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    .pill{
      background:rgba(255,255,255,.7);
      border:1px solid rgba(42,28,20,.08);
      padding:6px 10px;
      border-radius:999px;
      box-shadow: 0 10px 30px rgba(42,28,20,.08);
      backdrop-filter: blur(10px);
    }

    .layout{
      display:grid;
      grid-template-columns: 1.2fr .8fr;
      gap:14px;
      align-items:stretch;
    }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.94), rgba(255,253,248,.84));
      border:1px solid rgba(42,28,20,.09);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      position:relative;
      overflow:hidden;
    }

    .board{ padding: var(--boardPad); }

    .board::before{
      content:"";
      position:absolute;
      inset:-40px -40px auto -40px;
      height:160px;
      background: radial-gradient(closest-side, rgba(244,185,58,.22), transparent 70%);
      pointer-events:none;
    }

    .grid{
      display:grid;
      gap: var(--gridGap);
      justify-content:center;
      align-content:center;
      user-select:none;
      -webkit-user-select:none;
      touch-action:none;
      padding: var(--gridPad);
      border-radius: calc(var(--radius) - 6px);
      background:
        radial-gradient(1100px 520px at 50% 0%, rgba(232,69,69,.16), transparent 55%),
        radial-gradient(900px 450px at 10% 100%, rgba(15,169,143,.18), transparent 55%),
        linear-gradient(180deg, rgba(255,255,255,.75), rgba(255,255,255,.45));
      border: 1px solid rgba(42,28,20,.07);
      box-shadow: var(--shadow2);
    }

    .cell{
      position:relative;
      width: var(--cellSize);
      height: var(--cellSize);
      border-radius: var(--cellRadius);
      border: 1px solid rgba(42,28,20,.10);
      background: linear-gradient(180deg, #ffffff, #fff2e5);
      color: #23160f;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight: 800;
      letter-spacing:.4px;
      font-size: 16px;
      cursor:pointer;
      box-shadow:
        0 10px 18px rgba(42,28,20,.10),
        inset 0 2px 0 rgba(255,255,255,.9);
      transform: translateZ(0);
      transition: transform .08s ease, filter .18s ease, box-shadow .18s ease;
    }
    .cell:active{ transform: scale(.97); }
    .cell.selected{
      filter: saturate(1.1);
      box-shadow:
        0 14px 26px rgba(15,169,143,.26),
        inset 0 2px 0 rgba(255,255,255,.92);
      background: linear-gradient(180deg, rgba(15,169,143,.24), rgba(255,242,229,.96));
      border-color: rgba(15,169,143,.44);
    }

    .cell.found{
      border-color: rgba(42,28,20,.12);
      box-shadow: 0 14px 34px rgba(42,28,20,.14), inset 0 2px 0 rgba(255,255,255,.88);
      background: linear-gradient(180deg, rgba(217,164,65,.28), rgba(255,242,229,.94));
    }
    .cell.found::after{
      content:"";
      position:absolute;
      inset: -2px;
      border-radius: inherit;
      pointer-events:none;
      background: radial-gradient(closest-side, rgba(255,255,255,.55), transparent 70%);
      opacity:.0;
      animation: sparkle .85s ease-out;
    }

    @keyframes sparkle{
      0%{opacity:0; transform:scale(.9)}
      45%{opacity:.85; transform:scale(1.02)}
      100%{opacity:0; transform:scale(1.12)}
    }

    .panel{
      padding: 14px;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .teaWrap{
      display:flex;
      align-items:stretch;
      gap:12px;
    }

    .teaCard{
      flex:0 0 160px;
      padding: 12px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.70), rgba(255,247,238,.55));
      border:1px solid rgba(42,28,20,.08);
      box-shadow: 0 14px 28px rgba(42,28,20,.10);
      position:relative;
      overflow:hidden;
    }

    .teaCard h2{
      margin:0 0 10px 0;
      font-size: 13px;
      letter-spacing:.3px;
      color: var(--muted);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    .percent{
      font-variant-numeric: tabular-nums;
      color: #3a2a22;
      font-weight: 900;
      background: rgba(255,255,255,.75);
      border:1px solid rgba(42,28,20,.08);
      padding:2px 8px;
      border-radius:999px;
    }

    .glassWrap{
      height: 190px;
      width: 120px;
      margin: 0 auto;
      position:relative;
    }

    .glassSvg{
      display:block;
      width: 120px;
      height: 180px;
      filter: drop-shadow(0 14px 18px rgba(42,28,20,.14));
    }

    .teaGroup{
      transform-box: fill-box;
      transform-origin: 50% 100%;
      transform: scaleY(0);
      transition: transform .55s cubic-bezier(.22,1,.36,1);
    }

    .bubbles{
      position:absolute;
      left:0; right:0;
      top: 8px;
      height: 170px;
      pointer-events:none;
      opacity:.0;
      transition: opacity .25s ease;
    }

    .bubble{
      position:absolute;
      bottom:8px;
      width:8px; height:8px;
      border-radius:999px;
      background: rgba(255,255,255,.38);
      filter: blur(.1px);
      animation: rise 2.2s ease-in infinite;
    }

    @keyframes rise{
      0%{transform: translateY(0) scale(.9); opacity: 0}
      15%{opacity:.9}
      100%{transform: translateY(-150px) scale(1.15); opacity: 0}
    }

    .saucer{
      position:absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 130px;
      height: 28px;
      opacity: .95;
    }

    .words{
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,.65);
      border:1px solid rgba(42,28,20,.08);
      box-shadow: 0 14px 28px rgba(42,28,20,.10);
      min-height: 220px;
    }

    .words h2{
      margin:0 0 10px 0;
      font-size: 13px;
      letter-spacing:.3px;
      color: var(--muted);
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
    }

    ul.wordList{
      list-style:none;
      margin:0;
      padding:0;
      display:grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    .word{
      display:flex;
      justify-content:space-between;
      gap:10px;
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid rgba(42,28,20,.08);
      background: linear-gradient(180deg, rgba(255,255,255,.78), rgba(255,255,255,.50));
      box-shadow: 0 10px 16px rgba(42,28,20,.08);
      align-items:baseline;
    }

    .word .tr{ font-weight: 900; letter-spacing:.3px; }
    .word .ru{ color: var(--muted); font-size: 12px; text-align:right; }

    .word.found{
      opacity:.78;
      background: linear-gradient(180deg, rgba(15,169,143,.20), rgba(255,255,255,.62));
      border-color: rgba(15,169,143,.30);
    }
    .word.found .tr, .word.found .ru{
      text-decoration: line-through;
      text-decoration-thickness: 2px;
      text-decoration-color: rgba(15,169,143,.68);
    }

    .footerHint{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      flex-wrap:wrap;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,.60);
      border:1px solid rgba(42,28,20,.07);
      box-shadow: 0 10px 22px rgba(42,28,20,.08);
      color: var(--muted);
      font-size: 12px;
    }

    .btn{
      appearance:none;
      border:none;
      background: linear-gradient(180deg, #E84545, #B91F2B);
      color: #fff;
      font-weight: 900;
      letter-spacing:.2px;
      padding: 10px 14px;
      border-radius: 14px;
      box-shadow: 0 16px 26px rgba(232,69,69,.30);
      cursor:pointer;
      transition: transform .08s ease, filter .15s ease;
    }
    .btn:active{ transform: scale(.98); }
    .btn.secondary{
      background: linear-gradient(180deg, #0FA98F, #0B7564);
      box-shadow: 0 16px 26px rgba(15,169,143,.30);
    }

    .overlay{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      padding: 20px;
      background: rgba(22,14,10,.35);
      backdrop-filter: blur(10px);
      z-index: 20;
    }
    .overlay.show{ display:flex; }

    .win{
      width:min(520px, 96vw);
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,247,238,.85));
      border:1px solid rgba(42,28,20,.12);
      box-shadow: 0 26px 80px rgba(0,0,0,.28);
      padding: 18px;
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    .win::before{
      content:"";
      position:absolute;
      inset:-60px -60px auto -60px;
      height:180px;
      background: radial-gradient(closest-side, rgba(217,164,65,.24), transparent 70%);
      pointer-events:none;
    }

    .win h2{ margin: 6px 0 6px 0; font-size: 22px; letter-spacing:.2px; }
    .win p{ margin: 0 0 14px 0; color: var(--muted); font-size: 13px; line-height:1.45; }

    .confetti{ position:absolute; inset:0; pointer-events:none; overflow:hidden; }

    .piece{
      position:absolute;
      top:-10px;
      width:10px;
      height:14px;
      border-radius: 3px;
      opacity:.9;
      animation: fall 1.7s ease-in forwards;
    }

    @keyframes fall{ to{ transform: translateY(120vh) rotate(360deg); opacity:0.98; } }

    @media (max-width: 980px){
      :root{ --cellSize: 40px; --gridGap: 5px; }
      .layout{ grid-template-columns: 1fr; }
      .teaWrap{ justify-content:space-between; }
      .teaCard{ flex: 0 0 170px; }
      ul.wordList{ grid-template-columns: 1fr 1fr; }
    }

    /* Mobile: bigger cells but tighter padding/gap */
    @media (max-width: 520px){
      :root{ --cellSize: 38px; --gridGap: 3px; --boardPad: 10px; --gridPad: 6px; }
      header{ flex-direction:column; align-items:flex-start; }
      .teaWrap{ flex-direction:row; }
      .teaCard{ flex:0 0 160px; }
      ul.wordList{ grid-template-columns: 1fr; }
      .glassWrap{ height: 180px; width: 120px; }
      .glassSvg{ height: 170px; }
    }

    @media (prefers-reduced-motion: reduce){
      *{ animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="title">
        <h1>Doğa — сетка слов на турецком</h1>
        <div class="sub">
          <div class="pill">Спокойный режим — без таймера</div>
          <div class="pill">Выделяй слова свайпом по буквам</div>
        </div>
      </div>
      <button id="btnNew" class="btn" type="button">Новая сетка</button>
    </header>

    <div class="layout">
      <section class="card board" aria-label="Игровое поле">
        <div id="grid" class="grid" role="grid" aria-label="Сетка букв"></div>
      </section>

      <aside class="card panel" aria-label="Слова и прогресс">
        <div class="teaWrap">
          <div class="teaCard" aria-label="Стакан турецкого чая">
            <h2>
              <span>Çay</span>
              <span id="pct" class="percent">0%</span>
            </h2>

            <div class="glassWrap" aria-hidden="true">
              <svg class="glassSvg" viewBox="0 0 120 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <defs>
                  <linearGradient id="teaGrad" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#E2573A" stop-opacity="0.78"/>
                    <stop offset="100%" stop-color="#7A1A12" stop-opacity="0.84"/>
                  </linearGradient>

                  <linearGradient id="glassShine" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0%" stop-color="rgba(255,255,255,.05)"/>
                    <stop offset="35%" stop-color="rgba(255,255,255,.45)"/>
                    <stop offset="75%" stop-color="rgba(255,255,255,.08)"/>
                    <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
                  </linearGradient>

                  <clipPath id="glassClip">
                    <!-- tulip-like Turkish tea glass (armudu) -->
                    <path d="M24 16 C18 36 20 54 30 76 C40 92 40 110 33 126 C24 150 18 166 16 178 C18 194 36 198 60 198 C84 198 102 194 104 178 C102 166 96 150 87 126 C80 110 80 92 90 76 C100 54 102 36 96 16 Z"/>
                  </clipPath>
                </defs>

                <!-- Tea fill (clipped by glass) -->
                <g id="teaGroup" class="teaGroup" clip-path="url(#glassClip)">
                  <rect x="0" y="0" width="120" height="200" fill="url(#teaGrad)"/>
                  <ellipse cx="58" cy="40" rx="40" ry="16" fill="rgba(255,255,255,.18)"/>
                </g>

                <!-- Glass body -->
                <path d="M24 16 C18 36 20 54 30 76 C40 92 40 110 33 126 C24 150 18 166 16 178 C18 194 36 198 60 198 C84 198 102 194 104 178 C102 166 96 150 87 126 C80 110 80 92 90 76 C100 54 102 36 96 16 Z"
                      fill="rgba(255,255,255,.14)" stroke="rgba(26,15,11,.26)" stroke-width="3"/>

                <!-- Rim line -->
                <path d="M28 20 C40 16 52 15 60 15 C68 15 80 16 92 20" fill="none" stroke="rgba(26,15,11,.28)" stroke-width="2.2" stroke-linecap="round"/>

                <!-- Shine -->
                <path d="M38 24 C33 54 33 70 39 88 C45 106 42 126 36 144 C30 162 30 174 34 186"
                      fill="none" stroke="url(#glassShine)" stroke-width="6" stroke-linecap="round" opacity=".92"/>
              </svg>

              <div id="bubbles" class="bubbles" aria-hidden="true"></div>

              <!-- Saucer (optional) -->
              <svg class="saucer" viewBox="0 0 140 30" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <defs>
                  <linearGradient id="sauc" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#F3D7B1"/>
                    <stop offset="100%" stop-color="#D3A060"/>
                  </linearGradient>
                </defs>
                <ellipse cx="70" cy="18" rx="60" ry="10" fill="url(#sauc)" stroke="rgba(138,90,43,.35)" stroke-width="1.6"/>
                <ellipse cx="70" cy="18" rx="34" ry="5.5" fill="rgba(255,255,255,.14)"/>
              </svg>
            </div>
          </div>

          <div class="words" aria-label="Список слов">
            <h2>
              <span>Слова</span>
              <span id="foundCount" class="pill">0/0</span>
            </h2>
            <ul id="wordList" class="wordList"></ul>
          </div>
        </div>
      </aside>
    </div>

    <div class="footerHint">
      <span>Подсказка: слово может быть горизонтально или вертикально.</span>
      <button id="btnReset" class="btn secondary" type="button">Сбросить прогресс</button>
    </div>
  </div>

  <div id="overlay" class="overlay" aria-hidden="true">
    <div class="win" role="dialog" aria-modal="true" aria-label="Победа">
      <div id="confetti" class="confetti" aria-hidden="true"></div>
      <h2>Tebrikler!</h2>
      <p>Все слова найдены. Чай полный — можно отдыхать.</p>
      <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
        <button id="btnAgain" class="btn" type="button">Сыграть ещё</button>
        <button id="btnClose" class="btn secondary" type="button">Закрыть</button>
      </div>
    </div>
  </div>

  <script>
    window.onload = function(){
      var SIZE = 10;
      var TURKISH_ALPHA = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ";

      // 10 слов (убрали самые длинные)
      var WORDS = [
        { tr: "orman",  ru: "лес" },
        { tr: "kır",    ru: "поле" },
        { tr: "çiçek",  ru: "цветок" },
        { tr: "böcek",  ru: "жук" },
        { tr: "ağaç",   ru: "дерево" },
        { tr: "deniz",  ru: "море" },
        { tr: "kuş",    ru: "птица" },
        { tr: "dalga",  ru: "волна" },
        { tr: "çöl",    ru: "пустыня" },
        { tr: "plaj",   ru: "пляж" }
      ];

      var COLORS = [
        "#E84545", // nar
        "#0FA98F", // turkuaz
        "#F4B93A", // gold
        "#7D3C98", // mor
        "#2E86C1", // mavi
        "#E67E22",
        "#16A085",
        "#C0392B",
        "#8E44AD",
        "#27AE60"
      ];

      var gridEl = document.getElementById("grid");
      var wordListEl = document.getElementById("wordList");
      var foundCountEl = document.getElementById("foundCount");
      var pctEl = document.getElementById("pct");
      var bubblesEl = document.getElementById("bubbles");
      var overlayEl = document.getElementById("overlay");
      var confettiEl = document.getElementById("confetti");

      var teaGroup = document.getElementById("teaGroup");

      var btnNew = document.getElementById("btnNew");
      var btnReset = document.getElementById("btnReset");
      var btnAgain = document.getElementById("btnAgain");
      var btnClose = document.getElementById("btnClose");

      // Board state
      var board = [];

      // Found words: simple map for max compatibility
      var foundMap = {};
      var foundN = 0;

      // Selection state
      var selecting = false;
      var path = []; // {r,c}
      var dir = null; // {dr,dc}

      // Web Audio
      var audioCtx = null;
      var audioArmed = false;

      function upTR(s){
        // Manual Turkish uppercase — iOS Safari toLocaleUpperCase('tr-TR') can fail
        var map = {'ı':'I','i':'İ','ş':'Ş','ç':'Ç','ö':'Ö','ü':'Ü','ğ':'Ğ','â':'Â'};
        var out = "";
        var i;
        for(i=0; i<s.length; i++){
          var ch = s.charAt(i);
          out += (map[ch] ? map[ch] : ch.toUpperCase());
        }
        return out;
      }

      function randInt(n){ return Math.floor(Math.random() * n); }

      function pick(arr){ return arr[randInt(arr.length)]; }

      function normStep(dr, dc){
        var sdr = (dr === 0) ? 0 : (dr > 0 ? 1 : -1);
        var sdc = (dc === 0) ? 0 : (dc > 0 ? 1 : -1);
        return { dr: sdr, dc: sdc };
      }

      function sameDir(a, b){ return !!(a && b && a.dr === b.dr && a.dc === b.dc); }

      function makeEmptyBoard(){
        var b = [];
        var r, c;
        for(r=0; r<SIZE; r++){
          var row = [];
          for(c=0; c<SIZE; c++) row.push("");
          b.push(row);
        }
        return b;
      }

      function fits(r, c){ return r >= 0 && r < SIZE && c >= 0 && c < SIZE; }

      function generateBoard(){
        // No diagonals
        var directions = [
          {dr: 1, dc: 0}, {dr: -1, dc: 0},
          {dr: 0, dc: 1}, {dr: 0, dc: -1}
        ];

        var wordsUpper = [];
        var i;
        for(i=0; i<WORDS.length; i++){
          var w = WORDS[i];
          wordsUpper.push({ tr: w.tr, ru: w.ru, up: upTR(w.tr) });
        }

        wordsUpper.sort(function(a,b){ return b.up.length - a.up.length; });

        var attempt;
        for(attempt=0; attempt<140; attempt++){
          var b = makeEmptyBoard();
          var okAll = true;

          var wi;
          for(wi=0; wi<wordsUpper.length; wi++){
            var ww = wordsUpper[wi];
            var placed = false;
            var t;

            for(t=0; t<650; t++){
              var d = pick(directions);
              var len = ww.up.length;

              var r0 = randInt(SIZE);
              var c0 = randInt(SIZE);
              var r1 = r0 + (len - 1) * d.dr;
              var c1 = c0 + (len - 1) * d.dc;
              if(!fits(r1, c1)) continue;

              var can = true;
              var j;
              for(j=0; j<len; j++){
                var rr = r0 + j * d.dr;
                var cc = c0 + j * d.dc;
                var ch = ww.up.charAt(j);
                var cur = b[rr][cc];
                if(cur !== "" && cur !== ch){ can = false; break; }
              }
              if(!can) continue;

              for(j=0; j<len; j++){
                rr = r0 + j * d.dr;
                cc = c0 + j * d.dc;
                b[rr][cc] = ww.up.charAt(j);
              }

              placed = true;
              break;
            }

            if(!placed){ okAll = false; break; }
          }

          if(!okAll) continue;

          // Fill empty
          var r, c;
          for(r=0; r<SIZE; r++){
            for(c=0; c<SIZE; c++){
              if(b[r][c] === ""){
                b[r][c] = TURKISH_ALPHA.charAt(randInt(TURKISH_ALPHA.length));
              }
            }
          }

          return b;
        }

        // fallback (should not happen)
        var fb = makeEmptyBoard();
        for(r=0; r<SIZE; r++){
          for(c=0; c<SIZE; c++) fb[r][c] = TURKISH_ALPHA.charAt(randInt(TURKISH_ALPHA.length));
        }
        return fb;
      }

      function renderBoard(){
        gridEl.innerHTML = "";
        gridEl.style.gridTemplateColumns = "repeat(" + SIZE + ", var(--cellSize))";

        var frag = document.createDocumentFragment();
        var r, c;
        for(r=0; r<SIZE; r++){
          for(c=0; c<SIZE; c++){
            var btn = document.createElement("button");
            btn.type = "button";
            btn.className = "cell";
            btn.textContent = board[r][c];
            btn.setAttribute("data-r", String(r));
            btn.setAttribute("data-c", String(c));
            btn.setAttribute("role", "gridcell");
            btn.setAttribute("aria-label", (r+1) + ":" + (c+1) + " " + board[r][c]);
            frag.appendChild(btn);
          }
        }
        gridEl.appendChild(frag);
      }

      function renderWords(){
        wordListEl.innerHTML = "";
        var i;
        for(i=0; i<WORDS.length; i++){
          var w = WORDS[i];
          var li = document.createElement("li");
          li.className = "word";
          li.setAttribute("data-word", upTR(w.tr));
          li.setAttribute("data-idx", String(i));
          li.innerHTML = '<span class="tr">' + w.tr + '</span><span class="ru">' + w.ru + '</span>';
          wordListEl.appendChild(li);
        }
        updateUI();
      }

      function foundHas(wordUp){ return foundMap[wordUp] === 1; }

      function foundAdd(wordUp){
        if(foundHas(wordUp)) return false;
        foundMap[wordUp] = 1;
        foundN += 1;
        return true;
      }

      function foundReset(){
        foundMap = {};
        foundN = 0;
      }

      function updateTeaFill(pct){
        if(!teaGroup) return;
        var s = pct / 100;
        if(s < 0) s = 0;
        if(s > 1) s = 1;
        teaGroup.style.transform = "scaleY(" + s + ")";
      }

      function updateUI(){
        var total = WORDS.length;
        foundCountEl.textContent = foundN + "/" + total;

        var p = total ? Math.round((foundN / total) * 100) : 0;
        pctEl.textContent = p + "%";
        updateTeaFill(p);

        bubblesEl.style.opacity = foundN ? "1" : "0";

        // update word list
        var children = wordListEl.children;
        var i;
        for(i=0; i<children.length; i++){
          var li = children[i];
          var wu = li.getAttribute("data-word");
          if(foundHas(wu)) li.classList.add("found");
          else li.classList.remove("found");
        }
      }

      function clearSelectionVisual(){
        var els = document.querySelectorAll(".cell.selected");
        var i;
        for(i=0; i<els.length; i++) els[i].classList.remove("selected");
      }

      function cellEl(r, c){
        return gridEl.querySelector('.cell[data-r="' + r + '"][data-c="' + c + '"]');
      }

      function setSelectedVisual(){
        clearSelectionVisual();
        var i;
        for(i=0; i<path.length; i++){
          var p = path[i];
          var el = cellEl(p.r, p.c);
          if(el && !el.classList.contains("found")) el.classList.add("selected");
        }
      }

      function findCellFromElement(el){
        while(el && el !== gridEl){
          if(el.classList && el.classList.contains("cell")) return el;
          el = el.parentNode;
        }
        return null;
      }

      function pointToCell(clientX, clientY){
        var el = document.elementFromPoint(clientX, clientY);
        if(!el) return null;
        var btn = findCellFromElement(el);
        if(!btn) return null;
        var r = Number(btn.getAttribute("data-r"));
        var c = Number(btn.getAttribute("data-c"));
        if(isNaN(r) || isNaN(c)) return null;
        return { r: r, c: c };
      }

      function pathString(){
        var s = "";
        var i;
        for(i=0; i<path.length; i++){
          var p = path[i];
          s += board[p.r][p.c];
        }
        return s;
      }

      function isKnownWord(s){
        var u = s;
        var r = u.split("").reverse().join("");
        var i;
        for(i=0; i<WORDS.length; i++){
          var wup = upTR(WORDS[i].tr);
          if(wup === u) return u;
          if(wup === r) return r;
        }
        return null;
      }

      function hexToRgba(hex, a){
        var h = hex.replace("#", "");
        var r = parseInt(h.slice(0,2), 16);
        var g = parseInt(h.slice(2,4), 16);
        var b = parseInt(h.slice(4,6), 16);
        return "rgba(" + r + "," + g + "," + b + "," + a + ")";
      }

      function popBubbles(){
        bubblesEl.innerHTML = "";
        var p = foundN;
        if(p < 2) p = 2;
        if(p > 10) p = 10;

        var i;
        for(i=0; i<p; i++){
          var b = document.createElement("div");
          b.className = "bubble";
          var left = 10 + Math.random() * 80;
          var delay = Math.random() * 0.9;
          var dur = 1.7 + Math.random() * 0.9;
          var size = 6 + Math.random() * 7;
          b.style.left = left + "%";
          b.style.animationDelay = delay + "s";
          b.style.animationDuration = dur + "s";
          b.style.width = size + "px";
          b.style.height = size + "px";
          bubblesEl.appendChild(b);
        }
      }

      function fireConfetti(){
        confettiEl.innerHTML = "";
        var colors = ["#E84545", "#0FA98F", "#F4B93A", "#2E86C1", "#FF7A00", "#8E44AD"]; 
        var i;
        for(i=0; i<42; i++){
          var p = document.createElement("div");
          p.className = "piece";
          p.style.left = (Math.random()*100) + "%";
          p.style.background = colors[i % colors.length];
          p.style.transform = "translateY(-10px) rotate(" + (Math.random()*120) + "deg)";
          p.style.animationDelay = (Math.random()*0.35) + "s";
          p.style.animationDuration = (1.35 + Math.random()*0.8) + "s";
          p.style.width = (8 + Math.random()*10) + "px";
          p.style.height = (10 + Math.random()*14) + "px";
          confettiEl.appendChild(p);
        }
      }

      function showWin(){
        overlayEl.classList.add("show");
        overlayEl.setAttribute("aria-hidden", "false");
        fireConfetti();
        playWinSound();
      }

      function hideWin(){
        overlayEl.classList.remove("show");
        overlayEl.setAttribute("aria-hidden", "true");
        confettiEl.innerHTML = "";
      }

      function clearSelection(){
        selecting = false;
        path = [];
        dir = null;
        clearSelectionVisual();
      }

      function resetProgress(){
        foundReset();
        hideWin();
        clearSelection();

        // remove found styles
        var cells = document.querySelectorAll(".cell");
        var i;
        for(i=0; i<cells.length; i++){
          cells[i].classList.remove("found");
          cells[i].classList.remove("selected");
          cells[i].removeAttribute("style");
        }

        var words = document.querySelectorAll(".word");
        for(i=0; i<words.length; i++){
          words[i].classList.remove("found");
          words[i].removeAttribute("style");
        }

        updateUI();
        popBubbles();
      }

      function newGame(){
        foundReset();
        hideWin();
        clearSelection();
        board = generateBoard();
        renderBoard();
        renderWords();
        popBubbles();
      }

      function markFound(wordUp){
        if(!foundAdd(wordUp)) return;

        // color
        var idx = 0;
        var i;
        for(i=0; i<WORDS.length; i++){
          if(upTR(WORDS[i].tr) === wordUp){ idx = i; break; }
        }
        var color = COLORS[idx % COLORS.length];

        // Lock in the cells for this path (in either direction)
        var candidate = pathString();
        var chosen = path;
        if(candidate !== wordUp){
          chosen = [];
          for(i=path.length-1; i>=0; i--) chosen.push(path[i]);
        }

        for(i=0; i<chosen.length; i++){
          var pp = chosen[i];
          var el = cellEl(pp.r, pp.c);
          if(!el) continue;
          el.classList.remove("selected");
          el.classList.add("found");
          el.style.background = "linear-gradient(180deg, " + hexToRgba(color,.34) + ", rgba(255,242,229,.96))";
          el.style.borderColor = hexToRgba(color,.42);
          el.style.boxShadow = "0 14px 30px " + hexToRgba(color,.18) + ", inset 0 2px 0 rgba(255,255,255,.9)";
        }

        // Highlight the word item
        var children = wordListEl.children;
        for(i=0; i<children.length; i++){
          var li = children[i];
          if(li.getAttribute("data-word") === wordUp){
            li.classList.add("found");
            li.style.borderColor = hexToRgba(color,.28);
            li.style.boxShadow = "0 14px 24px " + hexToRgba(color,.14);
            break;
          }
        }

        updateUI();
        playSuccessSound();
        popBubbles();

        if(foundN === WORDS.length) showWin();
      }

      function addToPath(cell){
        if(!cell) return;

        var last = path.length ? path[path.length - 1] : null;
        if(last && last.r === cell.r && last.c === cell.c) return;

        // no repeats
        var i;
        for(i=0; i<path.length; i++){
          if(path[i].r === cell.r && path[i].c === cell.c) return;
        }

        if(path.length === 0){
          path.push(cell);
          setSelectedVisual();
          return;
        }

        var prev = path[path.length - 1];
        var dr = cell.r - prev.r;
        var dc = cell.c - prev.c;

        // no diagonals: only 4-neighborhood
        if((Math.abs(dr) + Math.abs(dc)) !== 1) return;

        var step = normStep(dr, dc);

        if(path.length === 1){
          dir = step;
          path.push(cell);
          setSelectedVisual();
          return;
        }

        if(!sameDir(dir, step)) return;

        // enforce straight-line continuation
        var expected = { r: prev.r + dir.dr, c: prev.c + dir.dc };
        if(cell.r !== expected.r || cell.c !== expected.c) return;

        path.push(cell);
        setSelectedVisual();
      }

      function finalizeSelection(){
        if(path.length < 3){
          clearSelection();
          return;
        }
        var s = pathString();
        var hit = isKnownWord(s);
        if(hit) markFound(hit);
        clearSelection();
      }

      function armAudio(){
        if(audioArmed) return;
        audioArmed = true;
        try{
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch(err){
          audioCtx = null;
        }
      }

      function resumeAudio(){
        if(!audioCtx) return;
        if(audioCtx.state === "suspended"){
          try{ audioCtx.resume(); } catch(e){}
        }
      }

      function playSuccessSound(){
        if(!audioCtx) return;
        var t0 = audioCtx.currentTime;

        var master = audioCtx.createGain();
        master.gain.setValueAtTime(0.0001, t0);
        master.gain.exponentialRampToValueAtTime(0.35, t0 + 0.02);
        master.gain.exponentialRampToValueAtTime(0.001, t0 + 0.45);
        master.connect(audioCtx.destination);

        var freqs = [523.25, 659.25, 783.99];
        var i;
        for(i=0; i<freqs.length; i++){
          var f = freqs[i];
          var o = audioCtx.createOscillator();
          o.type = (i === 0) ? "triangle" : "sine";
          o.frequency.setValueAtTime(f, t0);
          o.frequency.exponentialRampToValueAtTime(f * 1.02, t0 + 0.08);

          var g = audioCtx.createGain();
          g.gain.setValueAtTime(0.0001, t0);
          g.gain.exponentialRampToValueAtTime(0.22 - i*0.04, t0 + 0.015);
          g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.38);

          o.connect(g);
          g.connect(master);
          o.start(t0 + i*0.008);
          o.stop(t0 + 0.42);
        }

        // noise spark
        var noiseBuf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.10), audioCtx.sampleRate);
        var data = noiseBuf.getChannelData(0);
        for(i=0; i<data.length; i++) data[i] = (Math.random()*2-1) * (1 - i/data.length);

        var ns = audioCtx.createBufferSource();
        ns.buffer = noiseBuf;
        var bp = audioCtx.createBiquadFilter();
        bp.type = "bandpass";
        bp.frequency.setValueAtTime(3200, t0);
        bp.Q.setValueAtTime(6, t0);

        var ng = audioCtx.createGain();
        ng.gain.setValueAtTime(0.0001, t0);
        ng.gain.exponentialRampToValueAtTime(0.18, t0 + 0.01);
        ng.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.12);

        ns.connect(bp);
        bp.connect(ng);
        ng.connect(master);
        ns.start(t0);
        ns.stop(t0 + 0.12);
      }

      function playWinSound(){
        if(!audioCtx) return;
        var t0 = audioCtx.currentTime;
        var master = audioCtx.createGain();
        master.gain.setValueAtTime(0.0001, t0);
        master.gain.exponentialRampToValueAtTime(0.45, t0 + 0.03);
        master.gain.exponentialRampToValueAtTime(0.001, t0 + 0.8);
        master.connect(audioCtx.destination);

        var notes = [
          {f: 523.25, dt:0.00},
          {f: 659.25, dt:0.06},
          {f: 783.99, dt:0.12},
          {f: 1046.5, dt:0.18}
        ];

        var i;
        for(i=0; i<notes.length; i++){
          var n = notes[i];
          var o = audioCtx.createOscillator();
          o.type = "sine";
          o.frequency.setValueAtTime(n.f, t0 + n.dt);
          var g = audioCtx.createGain();
          g.gain.setValueAtTime(0.0001, t0 + n.dt);
          g.gain.exponentialRampToValueAtTime(0.28, t0 + n.dt + 0.02);
          g.gain.exponentialRampToValueAtTime(0.0001, t0 + n.dt + 0.55);
          o.connect(g);
          g.connect(master);
          o.start(t0 + n.dt);
          o.stop(t0 + n.dt + 0.6);
        }
      }

      // Pointer / touch handling
      function onPointerDown(e){
        var tgt = e.target;
        if(!tgt) return;

        var cellBtn = findCellFromElement(tgt);
        if(!cellBtn) return;

        armAudio();
        resumeAudio();

        selecting = true;
        if(gridEl.setPointerCapture) gridEl.setPointerCapture(e.pointerId);

        var r = Number(cellBtn.getAttribute("data-r"));
        var c = Number(cellBtn.getAttribute("data-c"));
        clearSelection();
        selecting = true;
        addToPath({r:r, c:c});

        if(e && e.preventDefault) e.preventDefault();
      }

      function onPointerMove(e){
        if(!selecting) return;
        var cell = pointToCell(e.clientX, e.clientY);
        addToPath(cell);
        if(e && e.preventDefault) e.preventDefault();
      }

      function onPointerUp(e){
        if(!selecting) return;
        finalizeSelection();
        if(e && e.preventDefault) e.preventDefault();
      }

      function onPointerCancel(){
        if(!selecting) return;
        clearSelection();
      }

      btnNew.addEventListener("click", function(){ newGame(); });
      btnReset.addEventListener("click", function(){ resetProgress(); });
      btnAgain.addEventListener("click", function(){ hideWin(); newGame(); });
      btnClose.addEventListener("click", function(){ hideWin(); });
      overlayEl.addEventListener("click", function(e){
        if(e && e.target === overlayEl) hideWin();
      });

      gridEl.addEventListener("pointerdown", onPointerDown);
      gridEl.addEventListener("pointermove", onPointerMove);
      gridEl.addEventListener("pointerup", onPointerUp);
      gridEl.addEventListener("pointercancel", onPointerCancel);
      gridEl.addEventListener("lostpointercapture", onPointerCancel);

      // Prevent accidental scroll on iOS when selecting
      gridEl.addEventListener("touchmove", function(e){ if(e && e.preventDefault) e.preventDefault(); }, {passive:false});

      // init
      try{
        newGame();
      } catch(e){
        document.body.innerHTML = '<pre style="color:red;padding:20px">' + (e && e.message ? e.message : "Error") + '\n' + (e && e.stack ? e.stack : "") + '</pre>';
      }
    };
  </script>
</body>
</html>
